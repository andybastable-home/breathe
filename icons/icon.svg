<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Breathe app icon: a calm glowing orb on a deep indigo canvas. -->
  <!-- Full-bleed background covers the maskable safe zone. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#2b3a67"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </radialGradient>
    <radialGradient id="orb" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#6fd3c7"/>
      <stop offset="100%" stop-color="#4a9ed8"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Orb sits inside the maskable safe zone (r=150, centered). -->
  <circle cx="256" cy="256" r="150" fill="url(#orb)"/>
  <!-- Soft inner highlight. -->
  <circle cx="210" cy="206" r="48" fill="#ffffff" opacity="0.18"/>
</svg>
